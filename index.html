<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>51权益卡密领取</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0868e8;
font-family:"Microsoft YaHei";
}


.container{
width:100%;
max-width:520px;
margin:auto;
}


.banner{
width:100%;
display:block;
}



.form{

background:white;

padding:20px;

margin-top:-5px;

border-radius:25px 25px 0 0;

}


input{

width:100%;

height:50px;

border-radius:30px;

border:1px solid #ddd;

padding-left:20px;

font-size:16px;

margin-bottom:15px;

}



.code-box{

display:flex;

gap:10px;

}


.code-box input{

flex:1;

}



.code-btn{

width:120px;

border-radius:30px;

border:none;

background:#ff9900;

color:white;

font-size:15px;

}



.receive{

width:80%;

height:55px;

margin:20px auto 0;

display:block;

border-radius:35px;

border:none;

background:#ffc21c;

font-size:24px;

font-weight:bold;

color:#754000;

}



.rule{

background:white;

padding:20px;

margin-top:15px;

border-radius:20px;

line-height:1.8;

}



</style>

</head>


<body>


<div class="container">


<img src="vip.png" class="banner">



<div class="form">


<input id="phone" placeholder="请输入手机号">


<div class="code-box">

<input placeholder="请输入短信验证码">


<button class="code-btn"
onclick="sendCode()">
获取验证码
</button>

</div>



<button class="receive"
onclick="receive()">
立即领取
</button>


</div>



<div class="rule">

<h3>活动规则</h3>

<p>1. 输入手机号领取权益礼包</p>

<p>2. 每个账号限领取一次</p>

<p>3. 请确保信息准确</p>


</div>


</div>



<script>


function sendCode(){

alert("验证码已发送");

}



function receive(){

let phone=document.getElementById("phone").value;


if(phone==""){

alert("请输入手机号");

return;

}


alert("领取成功，请查看权益信息");

}


</script>


</body>
</html>
