<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>51权益卡密领取</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0868e8;
font-family:"Microsoft YaHei";
}

.container{
width:100%;
max-width:520px;
margin:auto;
position:relative;
}

.banner{
width:100%;
display:block;
}


/* 输入区域 */

.form{

position:absolute;

top:56%;

left:8%;

width:84%;

}


input{

width:100%;
height:50px;
border-radius:30px;
border:none;
padding-left:25px;
font-size:16px;
margin-bottom:15px;

}


.code-box{

display:flex;
gap:10px;

}


.code-box input{

width:65%;

}


.code-btn{

width:35%;

border-radius:30px;
border:none;
background:#ff9900;
color:white;
font-size:15px;

}


.receive{

width:75%;
height:55px;

margin:18px auto;

display:block;

border-radius:35px;

border:none;

background:#ffc21c;

font-size:24px;

font-weight:bold;

color:#754000;

}


.rule{

background:white;

padding:20px;

border-radius:20px;

margin-top:20px;

line-height:1.8;

}



</style>

</head>


<body>


<div class="container">


<img src="vip.png" class="banner">


<div class="form">


<input placeholder="请输入手机号">


<div class="code-box">

<input placeholder="请输入短信验证码">


<button class="code-btn">
获取验证码
</button>

</div>


<button class="receive">
立即领取
</button>


</div>



<div class="rule">

<h3>
活动规则
</h3>


<p>
1. 输入手机号领取权益礼包
</p>


<p>
2. 每个账号限领取一次
</p>


<p>
3. 请确保信息准确
</p>


</div>



</div>


</body>
</html>
