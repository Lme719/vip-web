<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>51权益卡密自助领取平台</title>

<style>
*{
 margin:0;
 padding:0;
 box-sizing:border-box;
}

body{
 background:#0868e8;
 font-family:"Microsoft YaHei";
}

.container{
 max-width:520px;
 margin:auto;
 position:relative;
}

.banner{
 width:100%;
 display:block;
}

.form{
 position:absolute;
 top:55%;
 width:100%;
 padding:0 8%;
}


input{
 width:100%;
 height:52px;
 border-radius:30px;
 border:none;
 padding-left:25px;
 font-size:16px;
 margin-bottom:15px;
}


.code-box{
 display:flex;
 gap:10px;
}


.code-box input{
 flex:1;
}


.code-btn{
 width:130px;
 border-radius:30px;
 border:none;
 background:#ff9900;
 color:white;
 font-size:16px;
}


.receive{
 display:block;
 margin:20px auto;
 width:70%;
 height:58px;
 border-radius:35px;
 border:none;
 background:#ffc21c;
 color:#754000;
 font-size:24px;
 font-weight:bold;
}


.rule{
 background:white;
 margin-top:20px;
 padding:20px;
 border-radius:20px;
 color:#333;
 line-height:1.8;
 font-size:14px;
}


</style>

</head>


<body>


<div class="container">


<img src="vip.png" class="banner">


<div class="form">


<input 
placeholder="请输入手机号"
id="phone">


<div class="code-box">

<input 
placeholder="请输入短信验证码"
id="code">


<button class="code-btn"
onclick="sendCode()">
获取验证码
</button>

</div>


<button class="receive"
onclick="submitForm()">
立即领取
</button>


</div>



<div class="rule">

<h3>活动规则</h3>

<p>
1. 输入手机号领取权益礼包
</p>

<p>
2. 每个账号限领取一次
</p>

<p>
3. 请确保填写信息准确
</p>


</div>


</div>



<script>

function sendCode(){

alert("验证码功能待接入短信接口");

}


function submitForm(){

let phone=document.getElementById("phone").value;


if(phone.length!=11){

alert("请输入正确手机号");

return;

}


alert("领取成功");

}


</script>


</body>
</html>
